run:
  timeout: 5m
  go: "1.25"
  tests: true
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  enable:
    # Default linters
    - errcheck # Checks for unchecked errors
    - gosimple # Suggests code simplifications
    - govet # Reports suspicious constructs
    - ineffassign # Detects ineffectual assignments
    - staticcheck # Advanced Go linter
    - unused # Checks for unused code

    # Additional quality linters
    - gofmt # Checks whether code was gofmt-ed
    - goimports # Checks import order and grouping
    - revive # Fast, configurable, extensible Go linter
    - gocyclo # Computes cyclomatic complexity
    - dupl # Detects code duplication
    - misspell # Finds commonly misspelled English words
    - gosec # Inspects source code for security problems
    - unconvert # Removes unnecessary type conversions
    - unparam # Reports unused function parameters
    - prealloc # Finds slice declarations that could be pre-allocated

  disable:
    - typecheck # Disabled because it can be slow and is covered by gopls

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  govet:
    enable-all: true
    disable:
      - shadow # Can be overly strict

  gocyclo:
    min-complexity: 15

  dupl:
    threshold: 100

  misspell:
    locale: US

  gosec:
    excludes:
      - G104 # Audit errors not checked (covered by errcheck)

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

issues:
  exclude-dirs:
    - dist
    - node_modules
    - .tmp
    - tmp

  exclude-files:
    - ".*\\.gen\\.go$" # Exclude generated files

  exclude-rules:
    # Exclude linters for test files
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
        - gosec

  max-issues-per-linter: 0
  max-same-issues: 0
