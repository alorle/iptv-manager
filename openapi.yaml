openapi: 3.0.3
info:
  title: Health Check API
  description: Simple health check API for verifying application and infrastructure status
  version: 1.0.0
  contact:
    name: IPTV Manager

servers:
  - url: http://localhost:8080/api
    description: Local development server

tags:
  - name: health
    description: Health check operations

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - version
        - timestamp
      properties:
        status:
          type: string
          description: Health status of the application
          example: healthy
        version:
          type: string
          description: Application version
          example: 1.0.0
        timestamp:
          type: string
          format: date-time
          description: Current server timestamp in ISO 8601 format

    Error:
      type: object
      properties:
        message:
          type: string
          description: Error message
        code:
          type: integer
          description: Error code

paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - health
      summary: Get application health status
      description: Returns the current health status of the application, including version and timestamp
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
